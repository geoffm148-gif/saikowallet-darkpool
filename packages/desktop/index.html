<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self' saiko-app:; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob:; worker-src blob: 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https: wss: saiko-app:;" />
    <title>Saiko Wallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html, body, #root {
        height: 100%;
        width: 100%;
      }
      body {
        background-color: #0A0A0A;
        color: #FFFFFF;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #141414;
      }
      ::-webkit-scrollbar-thumb {
        background: #2A2A2A;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #424242;
      }
      /* Remove default input styling */
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0 1000px #141414 inset;
        -webkit-text-fill-color: #FFFFFF;
        caret-color: #FFFFFF;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Polyfill process for libraries that check process.env / process.browser -->
    <script>
      window.process = window.process || { env: { NODE_ENV: 'production' }, browser: true, version: '', versions: {}, platform: 'browser' };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
