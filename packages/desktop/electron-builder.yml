appId: com.saikoinu.wallet
productName: Saiko Wallet
copyright: Copyright 2025 Saiko Inu
electronVersion: "35.7.5"
npmRebuild: false

publish:
  provider: github
  owner: geoffm148-gif
  repo: saikowallet-darkpool
  private: false

directories:
  output: release

files:
  - dist/**/*
  - electron/dist/**/*
  - circuits/**/*
  - assets/**/*

extraResources:
  - from: ../wallet-core/src/darkpool/circuits
    to: circuits
    filter:
      - withdrawal_final.zkey
      - verification_key.json
      - withdrawal_js/withdrawal.wasm

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  verifyUpdateCodeSignature: false
  signAndEditExecutable: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.icns
  category: public.app-category.finance

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: assets/icon.png
  category: Finance

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
